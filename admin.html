<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Inregistrari contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #2563eb;
      }

      body.dark {
        --bg: #0b1220;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --line: #1e293b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Jost", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 28px 20px;
      }

      .top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }

      .top-actions { display: flex; flex-wrap: wrap; gap: 8px; }

      h1 { margin: 0; font-size: 1.5rem; }

      .btn {
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--text);
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .login-card {
        max-width: 360px;
        margin: 48px auto;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 28px;
      }

      .login-card h2 { margin: 0 0 20px; }

      .input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 12px;
        font-size: 1rem;
        font-family: inherit;
        background: var(--bg);
        color: var(--text);
      }

      .input:focus {
        outline: 2px solid #93c5fd;
        border-color: #3b82f6;
      }

      .err { color: #dc2626; font-size: 0.9rem; margin-bottom: 12px; }

      .sub-list { display: flex; flex-direction: column; gap: 20px; }

      .sub-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        transition: box-shadow 0.2s ease;
      }

      body:not(.dark) .sub-card { --card: #f8fafc; }
      body.dark .sub-card { --card: #0f172a; }

      .sub-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
      body.dark .sub-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.25); }

      .sub-card-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px 20px;
        padding: 16px 20px;
        background: #f1f5f9;
        border-bottom: 1px solid var(--line);
        font-size: 0.9rem;
      }

      body.dark .sub-card-header { background: #1e293b; }

      .sub-card-date {
        font-weight: 700;
        color: var(--accent);
        font-size: 0.95rem;
      }

      .sub-card-name { font-weight: 700; color: var(--text); }

      .sub-card-pachet {
        padding: 4px 10px;
        background: #dbeafe;
        color: #1d4ed8;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      body.dark .sub-card-pachet { background: #1e3a5f; color: #93c5fd; }

      .sub-card-body {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px 24px;
      }

      .sub-field { display: flex; flex-direction: column; gap: 4px; }

      .sub-field-label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }

      .sub-field-value {
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .sub-field-value a {
        color: var(--accent);
        text-decoration: none;
      }

      .sub-field-value a:hover { text-decoration: underline; }

      .sub-mesaj {
        grid-column: 1 / -1;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        margin-top: 4px;
      }

      .sub-mesaj .sub-field-value {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .empty { text-align: center; padding: 48px; color: var(--muted); }
    </style>
  </head>
  <body class="dark">
    <div class="wrap">
      <div id="login-view" style="display: none;">
        <div class="login-card">
          <h2>Autentificare</h2>
          <p id="login-err" class="err" style="display: none;"></p>
          <form id="login-form">
            <input class="input" type="text" name="username" placeholder="User" required />
            <input class="input" type="password" name="password" placeholder="Parola" required />
            <button type="submit" class="btn primary" style="width: 100%; margin-top: 8px;">Intra</button>
          </form>
        </div>
      </div>

      <div id="admin-view" style="display: none;">
        <div class="top">
          <h1>Inregistrari contact</h1>
          <div class="top-actions">
            <button id="refresh-btn" class="btn">Reîmprospătare</button>
            <a href="/" class="btn">Înapoi</a>
            <button id="logout-btn" class="btn primary">Ieșire</button>
          </div>
        </div>
        <div id="sub-list"></div>
      </div>
    </div>

    <script>
      const API = "";
      const loginView = document.getElementById("login-view");
      const adminView = document.getElementById("admin-view");
      const loginForm = document.getElementById("login-form");
      const loginErr = document.getElementById("login-err");
      const subList = document.getElementById("sub-list");
      const refreshBtn = document.getElementById("refresh-btn");
      const logoutBtn = document.getElementById("logout-btn");

      function showLogin() {
        loginView.style.display = "block";
        adminView.style.display = "none";
      }

      function showAdmin() {
        loginView.style.display = "none";
        adminView.style.display = "block";
        loadSubmissions();
      }

      async function loadSubmissions() {
        const r = await fetch(API + "/api/submissions", { credentials: "include" });
        if (r.status === 401) {
          showLogin();
          return;
        }
        if (!r.ok) {
          subList.innerHTML = "<p class='empty'>Eroare la incarcare.</p>";
          return;
        }
        const data = await r.json();
        if (!data.length) {
          subList.innerHTML = "<p class='empty'>Nicio inregistrare inca.</p>";
          return;
        }
        subList.innerHTML = data.map((s) => {
          const d = new Date(s.createdAt);
          const dataStr = d.toLocaleDateString("ro-RO", {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
          const firmaVal = s.firma && s.firma.trim() ? escapeHtml(s.firma) : "—";
          return `
          <article class="sub-card">
            <div class="sub-card-header">
              <span class="sub-card-date">${capitalizeFirst(dataStr)}</span>
              <span class="sub-card-name">${escapeHtml(s.nume)}</span>
              <span class="sub-card-pachet">${escapeHtml(s.pachet)}</span>
            </div>
            <div class="sub-card-body">
              <div class="sub-field">
                <span class="sub-field-label">Email</span>
                <span class="sub-field-value"><a href="mailto:${escapeHtml(s.email)}">${escapeHtml(s.email)}</a></span>
              </div>
              <div class="sub-field">
                <span class="sub-field-label">Telefon</span>
                <span class="sub-field-value"><a href="tel:${escapeHtml(s.telefon)}">${escapeHtml(s.telefon)}</a></span>
              </div>
              <div class="sub-field">
                <span class="sub-field-label">Firma</span>
                <span class="sub-field-value">${firmaVal}</span>
              </div>
              <div class="sub-mesaj sub-field">
                <span class="sub-field-label">Mesaj</span>
                <span class="sub-field-value">${escapeHtml(s.mesaj)}</span>
              </div>
            </div>
          </article>
        `;
        }).join("");
      }

      function escapeHtml(s) {
        if (!s) return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function capitalizeFirst(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginErr.style.display = "none";
        const fd = new FormData(loginForm);
        const r = await fetch(API + "/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: fd.get("username"),
            password: fd.get("password"),
          }),
          credentials: "include",
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          loginErr.textContent = j.error || "Eroare la autentificare";
          loginErr.style.display = "block";
          return;
        }
        showAdmin();
      });

      refreshBtn.addEventListener("click", loadSubmissions);

      logoutBtn.addEventListener("click", async () => {
        await fetch(API + "/api/logout", { method: "POST", credentials: "include" });
        showLogin();
      });

      (async () => {
        const r = await fetch(API + "/api/submissions", { credentials: "include" });
        if (r.ok) showAdmin();
        else showLogin();
      })();
    </script>
  </body>
</html>
